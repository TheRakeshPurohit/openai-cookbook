<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="430" fill="none" viewBox="0 0 1400 430"><defs><linearGradient id="bg2" x1="0" x2="1400" y1="0" y2="430" gradientUnits="userSpaceOnUse"><stop stop-color="#FCFCFD"/><stop offset="1" stop-color="#F8FAFC"/></linearGradient><marker id="arrow-main" markerHeight="12" markerWidth="12" orient="auto" refX="10" refY="6"><path fill="#0F172A" d="M0 0L12 6L0 12V0Z"/></marker></defs><rect width="1400" height="430" fill="url(#bg2)" rx="28"/><text x="700" y="58" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">Human gates can be placed anywhere in the delivery path</text><path stroke="#0F172A" stroke-linecap="round" stroke-width="5" marker-end="url(#arrow-main)" d="M120 226H1275"/><g font-family="Inter, Arial, sans-serif"><circle cx="210" cy="226" r="28" fill="#DBEAFE" stroke="#2563EB" stroke-width="3"/><text x="210" y="232" fill="#1D4ED8" font-size="18" font-weight="700" text-anchor="middle">1</text><text x="210" y="162" fill="#0F172A" font-size="18" font-weight="700" text-anchor="middle">Trace review</text><text x="210" y="188" fill="#475569" font-size="15" text-anchor="middle">Add domain feedback</text><circle cx="470" cy="226" r="28" fill="#DBEAFE" stroke="#2563EB" stroke-width="3"/><text x="470" y="232" fill="#1D4ED8" font-size="18" font-weight="700" text-anchor="middle">2</text><text x="470" y="162" fill="#0F172A" font-size="18" font-weight="700" text-anchor="middle">Eval review</text><text x="470" y="188" fill="#475569" font-size="15" text-anchor="middle">Tighten the gate</text><circle cx="730" cy="226" r="28" fill="#DCFCE7" stroke="#16A34A" stroke-width="3"/><text x="730" y="232" fill="#15803D" font-size="18" font-weight="700" text-anchor="middle">3</text><text x="730" y="162" fill="#0F172A" font-size="18" font-weight="700" text-anchor="middle">PR review</text><text x="730" y="188" fill="#475569" font-size="15" text-anchor="middle">Inspect the diff</text><circle cx="990" cy="226" r="28" fill="#DCFCE7" stroke="#16A34A" stroke-width="3"/><text x="990" y="232" fill="#15803D" font-size="18" font-weight="700" text-anchor="middle">4</text><text x="990" y="162" fill="#0F172A" font-size="18" font-weight="700" text-anchor="middle">Merge approval</text><text x="990" y="188" fill="#475569" font-size="15" text-anchor="middle">Deploy by policy</text><rect width="180" height="160" x="1128" y="146" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2" rx="22"/><text x="1218" y="180" fill="#0F172A" font-size="18" font-weight="700" text-anchor="middle">Autonomous path</text><text x="1218" y="214" fill="#475569" font-size="15" text-anchor="middle">All gates can be</text><text x="1218" y="238" fill="#475569" font-size="15" text-anchor="middle">policy-driven when</text><text x="1218" y="262" fill="#475569" font-size="15" text-anchor="middle">confidence is high</text></g><text x="700" y="368" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">The same loop supports full autonomy, selective review, or review at every stage.</text></svg>