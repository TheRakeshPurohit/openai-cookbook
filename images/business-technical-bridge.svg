<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img" viewBox="0 0 1280 760"><title id="title">Workspace Agent API trigger flow</title><desc id="desc">A source event moves through a backend worker, API trigger, Workspace Agent, and output destination. The API trigger is engineering-owned. The Workspace Agent is business-owned.</desc><defs><pattern id="dot-grid" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#0b0b0b"/><circle cx="1.5" cy="1.5" r=".6" fill="#1d1d1d"/></pattern><pattern id="green-dots" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#11190e"/><circle cx="1.5" cy="1.5" r=".8" fill="#5f8f35"/></pattern><pattern id="blue-dots" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#101827"/><circle cx="1.5" cy="1.5" r=".8" fill="#5f84ff"/></pattern><marker id="arrow-green" markerHeight="12" markerUnits="strokeWidth" markerWidth="12" orient="auto" refX="10" refY="6"><path fill="#8fbd5f" d="M2,2 L10,6 L2,10 Z"/></marker><marker id="arrow-black" markerHeight="12" markerUnits="strokeWidth" markerWidth="12" orient="auto" refX="10" refY="6"><path fill="#f2f2f2" d="M2,2 L10,6 L2,10 Z"/></marker><style>.bg{fill:#070707}.title{fill:#f3f3f3;font:700 30px Arial,sans-serif}.subtitle{fill:#bdbdbd;font:400 16px Arial,sans-serif}.mono{fill:#f3f3f3;font:700 18px Menlo,Consolas,monospace;letter-spacing:.3px}.mono-small{fill:#b7b7b7;font:400 15px Menlo,Consolas,monospace}.small{fill:#c8c8c8;font:400 14px Arial,sans-serif}.label{fill:#f3f3f3;font:700 15px Arial,sans-serif}.pill,.track{stroke-width:2}.track{stroke:#4a4a4a}.pill{fill:#111;stroke:#f0f0f0}.eng-pill{fill:#101827;stroke:#6f92ff;stroke-width:2.5}.arrow,.biz-pill{stroke:#8fbd5f;stroke-width:2.5}.biz-pill{fill:#11190e}.arrow{fill:none;marker-end:url(#arrow-green)}.legend{fill:#090909;stroke:#f0f0f0;stroke-width:1.8}.legend-fill{fill:#090909;opacity:0}.swatch-biz,.swatch-eng{stroke-width:2}.swatch-eng{fill:#101827;stroke:#6f92ff}.swatch-biz{fill:#11190e;stroke:#8fbd5f}</style></defs><rect width="1280" height="760" x="0" y="0" class="bg"/><text x="56" y="66" class="title">Workspace Agent API trigger flow</text><text x="56" y="96" class="subtitle">The backend starts the run. The Workspace Agent follows the saved workflow and writes the result.</text><g id="headers"><rect width="190" height="78" x="62" y="152" class="pill" rx="32"/><text x="157" y="191" class="mono" dominant-baseline="middle" text-anchor="middle">SOURCE</text><rect width="190" height="78" x="310" y="152" class="pill" rx="32"/><text x="405" y="191" class="mono" dominant-baseline="middle" text-anchor="middle">BACKEND</text><rect width="190" height="78" x="558" y="152" class="eng-pill" rx="32"/><text x="653" y="191" class="mono" dominant-baseline="middle" text-anchor="middle">API TRIGGER</text><rect width="190" height="78" x="806" y="152" class="biz-pill" rx="32"/><text x="901" y="181" class="mono" dominant-baseline="middle" text-anchor="middle">WORKSPACE</text><text x="901" y="205" class="mono-small" dominant-baseline="middle" text-anchor="middle">AGENT</text><rect width="190" height="78" x="1054" y="152" class="pill" rx="32"/><text x="1149" y="191" class="mono" dominant-baseline="middle" text-anchor="middle">OUTPUT</text></g><g id="tracks"><line x1="157" x2="157" y1="230" y2="570" class="track"/><line x1="405" x2="405" y1="230" y2="570" class="track"/><line x1="653" x2="653" y1="230" y2="570" class="track"/><line x1="901" x2="901" y1="230" y2="570" class="track"/><line x1="1149" x2="1149" y1="230" y2="570" class="track"/></g><g id="flow"><path d="M157 296 L392 296" class="arrow"/><text x="194" y="284" class="mono-small">form submitted</text><path d="M405 372 L640 372" class="arrow"/><text x="452" y="360" class="mono-small">POST /trigger</text><text x="452" y="388" class="mono-small">with retry key</text><path d="M653 448 L888 448" class="arrow"/><text x="700" y="436" class="mono-small">202 Accepted</text><text x="700" y="464" class="mono-small">run queued</text><path d="M901 524 L1136 524" class="arrow"/><text x="946" y="512" class="mono-small">write final result</text></g><g id="legend"><rect width="1076" height="84" x="102" y="620" class="legend" rx="18"/><rect width="1076" height="84" x="102" y="620" class="legend-fill" rx="18"/><text x="136" y="655" class="label">Legend</text><rect width="18" height="18" x="136" y="674" class="swatch-eng" rx="4"/><text x="166" y="689" class="label">Engineering-owned</text><text x="326" y="689" class="small">Trigger call, tokens, secrets, and logs.</text><rect width="18" height="18" x="702" y="674" class="swatch-biz" rx="4"/><text x="732" y="689" class="label">Business-owned</text><text x="880" y="689" class="small">Instructions, context, approvals, and output.</text></g></svg>