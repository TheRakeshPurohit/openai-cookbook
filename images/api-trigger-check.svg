<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img" viewBox="0 0 1280 720"><title id="title">Check an API-triggered run</title><desc id="desc">The backend sends a trigger request. The API accepts the request. The agent writes the result to the destination.</desc><defs><pattern id="dot-grid" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#0b0b0b"/><circle cx="1.5" cy="1.5" r=".6" fill="#1d1d1d"/></pattern><pattern id="green-dots" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#11190e"/><circle cx="1.5" cy="1.5" r=".8" fill="#5f8f35"/></pattern><marker id="arrow-green" markerHeight="12" markerUnits="strokeWidth" markerWidth="12" orient="auto" refX="10" refY="6"><path fill="#8fbd5f" d="M2,2 L10,6 L2,10 Z"/></marker><style>.bg{fill:#070707}.title{fill:#f3f3f3;font:700 30px Arial,sans-serif}.subtitle{fill:#bdbdbd;font:400 16px Arial,sans-serif}.panel{fill:#090909;stroke:#f0f0f0;stroke-width:2}.panel-dots{fill:url(#dot-grid);opacity:.16}.pill{fill:#111;stroke:#f0f0f0;stroke-width:2}.pill-green{fill:#11190e;stroke:#8fbd5f;stroke-width:2.5}.mono{fill:#f3f3f3;font:700 18px Menlo,Consolas,monospace;letter-spacing:.3px}.mono-small{fill:#b7b7b7;font:400 15px Menlo,Consolas,monospace}.mono-green{fill:#9bd56a;font:700 15px Menlo,Consolas,monospace}.arrow{stroke:#8fbd5f;stroke-width:2.5;fill:none;marker-end:url(#arrow-green)}.thin{stroke:#4a4a4a;stroke-width:2}</style></defs><rect width="1280" height="720" x="0" y="0" class="bg"/><text x="56" y="66" class="title">Check an API-triggered run</text><text x="56" y="96" class="subtitle">The API confirms the trigger. The destination shows the outcome.</text><rect width="1152" height="438" x="64" y="144" class="panel" rx="18"/><rect width="1152" height="438" x="64" y="144" class="panel-dots" rx="18"/><rect width="230" height="78" x="112" y="204" class="pill" rx="32"/><text x="227" y="243" class="mono" dominant-baseline="middle" text-anchor="middle">BACKEND</text><rect width="230" height="78" x="526" y="204" class="pill-green" rx="32"/><text x="641" y="243" class="mono" dominant-baseline="middle" text-anchor="middle">API TRIGGER</text><rect width="230" height="78" x="938" y="204" class="pill" rx="32"/><text x="1053" y="243" class="mono" dominant-baseline="middle" text-anchor="middle">DESTINATION</text><line x1="227" x2="227" y1="282" y2="500" class="thin"/><line x1="641" x2="641" y1="282" y2="500" class="thin"/><line x1="1053" x2="1053" y1="282" y2="500" class="thin"/><path d="M227 348 L628 348" class="arrow"/><text x="310" y="336" class="mono-small">POST /trigger</text><text x="310" y="364" class="mono-small">input + idempotency key</text><path d="M641 420 L240 420" class="arrow"/><text x="360" y="408" class="mono-green">202 Accepted</text><text x="360" y="436" class="mono-small">queued, no response body</text><path d="M641 492 L1040 492" class="arrow"/><text x="748" y="480" class="mono-small">agent writes result</text><text x="748" y="508" class="mono-small">check here next</text><g id="note"><rect width="600" height="58" x="340" y="612" class="pill-green" rx="26"/><text x="640" y="641" class="mono" dominant-baseline="middle" text-anchor="middle">accepted does not mean finished</text></g></svg>